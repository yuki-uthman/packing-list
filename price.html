<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Price Label</title>

  <!-- html2canvas + jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>
<body>
  <div class="wrapper">
    <div id="label">
      <div id="priceText">45/-</div>
    </div>

    <div class="controls">
      <input
        type="number"
        id="priceInput"
        placeholder="Enter price"
        oninput="updatePrice()"
      />
      <button onclick="printLabel()">Print Label</button>
    </div>
  </div>

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 30px;
      background: #fff;
      border-radius: 15px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    #label {
      width: 150px;
      height: 100px;
      display: flex;
      justify-content: center;
      align-items: center;
      border: 2px dashed #ccc;
      border-radius: 12px;
      background: #fafafa;
      font-size: 2rem;
      font-weight: bold;
      color: #333;
      transition: all 0.2s ease;
    }

    #label:hover {
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      border-color: #999;
    }

    .controls {
      display: flex;
      gap: 10px;
      width: 100%;
      justify-content: center;
    }

    input#priceInput {
      padding: 10px 15px;
      font-size: 1rem;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
      width: 120px;
      text-align: center;
      transition: all 0.2s ease;
    }

    input#priceInput:focus {
      border-color: #007bff;
      box-shadow: 0 0 5px rgba(0,123,255,0.3);
    }

    button {
      padding: 10px 20px;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: #fff;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      background: #0056b3;
    }
  </style>

  <script>
    function updatePrice() {
      const priceInput = document.getElementById("priceInput");
      const priceText = document.getElementById("priceText");
      if (priceInput.value.trim() === "") {
        priceText.textContent = "45";
      } else {
        priceText.textContent =  priceInput.value;
      }
    }

    function printLabel() {
      const node = document.getElementById("label");

      const mmToPx = mm => mm * 3.78;
      const labelWidthMM = 30;
      const labelHeightMM = 25;

      const tempDiv = document.createElement('div');
      tempDiv.style.position = 'absolute';
      tempDiv.style.left = '-9999px';
      tempDiv.style.top = '-9999px';
      tempDiv.style.width = mmToPx(labelWidthMM) + 'px';
      tempDiv.style.height = mmToPx(labelHeightMM) + 'px';
      tempDiv.style.margin = '0';
      tempDiv.style.padding = '0';
      tempDiv.style.boxSizing = 'border-box';
      tempDiv.style.backgroundColor = 'white';
      tempDiv.style.fontSmoothing = 'antialiased';

      const labelClone = node.cloneNode(true);
      labelClone.style.width = '100%';
      labelClone.style.height = '100%';
      labelClone.style.border = 'none';
      labelClone.style.margin = '0';
      labelClone.style.padding = '0';
      labelClone.style.display = 'flex';
      labelClone.style.justifyContent = 'center';
      labelClone.style.alignItems = 'center';

      tempDiv.appendChild(labelClone);
      document.body.appendChild(tempDiv);

      html2canvas(tempDiv, { scale: 4, backgroundColor: '#fff' }).then(canvas => {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({
          orientation: 'landscape',
          unit: 'mm',
          format: [labelWidthMM, labelHeightMM]
        });

        const imgData = canvas.toDataURL('image/png');
        pdf.addImage(imgData, 'PNG', 0, 0, labelWidthMM, labelHeightMM);

        const pdfBlob = pdf.output('blob');
        const pdfUrl = URL.createObjectURL(pdfBlob);
        window.open(pdfUrl, '_blank');
      }).finally(() => {
        document.body.removeChild(tempDiv);
      });
    }
  </script>
</body>
</html>
